name: OTM Selenium Tests

on:
  workflow_dispatch:
    inputs:
      test_file:
        description: 'Test to run (e.g. Test_01_Login.js or SanityTestSuite.js)'
        required: true
        default: 'Test_01_Login.js'
      otm_url:
        description: 'OTM URL'
        required: true
        default: 'https://otmgtm-test-a629995.otmgtm.us-phoenix-1.ocs.oraclecloud.com/'
      otm_username:
        description: 'OTM Username'
        required: true
        default: 'LEL7597'

jobs:
  run-otm-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install TypeScript and Mocha
        run: npm install -g typescript mocha

      - name: Compile TypeScript
        run: tsc

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Download ChromeDriver
        run: |
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+' | head -1)
          echo "Chrome version: $CHROME_VERSION"
          wget -q "https://googlechromelabs.github.io/chrome-for-testing/known-good-versions-with-downloads.json" -O versions.json
          DRIVER_URL=$(python3 -c "
          import json
          data = json.load(open('versions.json'))
          versions = [v for v in data['versions'] if v['version'].startswith('$CHROME_VERSION.')]
          if versions:
              v = versions[-1]
              for d in v.get('downloads', {}).get('chromedriver', []):
                  if d['platform'] == 'linux64':
                      print(d['url'])
                      break
          ")
          echo "Downloading: $DRIVER_URL"
          wget -q "$DRIVER_URL" -O chromedriver.zip
          unzip chromedriver.zip
          find . -name "chromedriver" -not -path "./.git/*" | head -1 | xargs -I{} mv {} ./chromedriver
          chmod +x ./chromedriver

      - name: Create EnvironmentConfig.json
        run: |
          cat > EnvironmentConfig.json << EOF
          {
            "URL": "${{ github.event.inputs.otm_url }}",
            "DBA_USERNAME": "${{ github.event.inputs.otm_username }}",
            "DBA_PASSWORD": "${{ secrets.OTM_PASSWORD }}",
            "ChromeDriverPath": "./chromedriver",
            "BROWSER": "chrome",
            "HeadlessBrowser": "true",
            "ELEMENT_TIMEOUT": 30000,
            "ScreenShotPath": "./Results/SanityBatch/Screenshots/",
            "LogFilePath": "./Results/SanityBatch/Logs/"
          }
          EOF

      - name: Create Results directories
        run: mkdir -p Results/SanityBatch/Screenshots Results/SanityBatch/Logs

      - name: Run OTM Tests
        run: npm test ./Bin/Tests/SanityBatch/${{ github.event.inputs.test_file }}
        continue-on-error: true

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: otm-test-report
          path: |
            mochawesome-report/
            Results/

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-screenshots
          path: Results/SanityBatch/Screenshots/